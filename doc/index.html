<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW 3.14159 // DEVELOPER DOCS</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* --- WIKI SPECIFIC LAYOUT --- */
        .wiki-container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            align-items: flex-start;
        }

        .wiki-sidebar {
            width: 280px;
            flex-shrink: 0; /* Prevents the sidebar from getting squished */
            position: sticky;
            top: 20px;
        }

        .wiki-content {
            flex-grow: 1;
            min-width: 0; /* CRITICAL FIX: Prevents large <pre> code blocks from blowing out the flex container and overlapping */
            background: rgba(0, 20, 30, 0.4);
            padding: 40px;
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.05);
            min-height: 60vh;
        }

        @media (max-width: 800px) {
            .wiki-container { flex-direction: column; }
            .wiki-sidebar { width: 100%; position: relative; top: 0; }
        }

        /* --- SIDEBAR NAVIGATION BUTTONS --- */
        #doc-nav {
            display: flex;
            flex-direction: column; /* CRITICAL FIX: Overrides any horizontal global nav styles */
            gap: 8px;
            align-items: stretch;
        }

        .nav-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: var(--neon-cyan);
            padding: 12px 15px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            transition: 0.2s;
            border-radius: 4px;
        }

        .nav-btn:hover {
            border-color: rgba(0, 255, 204, 0.5);
            background: rgba(0, 255, 204, 0.05);
        }

        .nav-btn.active {
            border-color: var(--neon-cyan);
            background: rgba(0, 255, 204, 0.1);
            color: #FFF;
            font-weight: bold;
            box-shadow: inset 4px 0 0 var(--neon-cyan);
        }

        /* --- DYNAMIC TABLE OF CONTENTS TREE --- */
        .toc-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-left: 15px;
            margin-bottom: 10px;
            border-left: 1px solid #333;
            padding-left: 10px;
        }

        .toc-link {
            background: none;
            border: none;
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 0;
            color: #888;
            transition: color 0.2s;
        }

        .toc-link:hover { color: var(--neon-cyan); }
        .toc-h2 { font-weight: bold; color: #AAA; }
        .toc-h3 { padding-left: 12px; font-size: 0.8rem; border-left: 1px dashed #444; margin-left: 4px;}

        /* --- MARKDOWN RENDERING STYLES --- */
        #rendered-markdown { font-size: 1.05rem; line-height: 1.6; color: #E0E0E0; }
        #rendered-markdown h1 { color: var(--neon-cyan); font-size: 2.2rem; border-bottom: 2px solid var(--neon-cyan); padding-bottom: 10px; margin-bottom: 25px; margin-top: 0; }
        
        /* Added scroll-margin-top so anchor links don't hide beneath the top of the screen */
        #rendered-markdown h2 { color: var(--neon-gold); font-size: 1.6rem; border-bottom: 1px dashed #555; padding-bottom: 8px; margin-top: 35px; margin-bottom: 15px; scroll-margin-top: 20px; }
        #rendered-markdown h3 { color: var(--neon-pink); margin-top: 25px; margin-bottom: 10px; font-size: 1.2rem; scroll-margin-top: 20px; }
        
        #rendered-markdown p { margin-bottom: 20px; }
        #rendered-markdown a { color: var(--neon-pink); text-decoration: none; border-bottom: 1px dotted var(--neon-pink); transition: 0.2s; }
        #rendered-markdown a:hover { color: #FFF; border-bottom-style: solid; }
        #rendered-markdown ul, #rendered-markdown ol { padding-left: 25px; margin-bottom: 20px; }
        #rendered-markdown li { margin-bottom: 8px; }
        #rendered-markdown strong { color: #FFF; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        
        #rendered-markdown pre { 
            background: #050a0f; 
            padding: 20px; 
            border: 1px solid #333; 
            border-radius: 6px; 
            overflow-x: auto; 
            margin-bottom: 25px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        #rendered-markdown code { 
            font-family: 'Share Tech Mono', monospace; 
            color: var(--neon-green, #00FF33); 
            background: rgba(0, 255, 51, 0.05);
            padding: 2px 5px;
            border-radius: 3px;
        }
        #rendered-markdown pre code { background: none; padding: 0; color: #CCC; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1 style="color: var(--neon-cyan);">WW 3.14159 // ARCHIVES & DOCS</h1>
            <nav style="display: flex; gap: 15px; align-items: center;">
                <a href="../index.html" class="admin-header-link" style="color: var(--neon-gold); border-color: var(--neon-gold);">Return to Base</a>
            </nav>
        </header>

        <main class="main-content wiki-container">
            
            <aside class="wiki-sidebar panel-box">
                <h3 style="margin-bottom: 15px; color: var(--neon-gold); border-bottom: 1px dashed #333; padding-bottom: 10px;">Directory</h3>
                <nav id="doc-nav">
                    <button class="nav-btn active" data-file="README.md">01. Overview</button>
                    <button class="nav-btn" data-file="ARCHITECTURE.md">02. Architecture</button>
                    <button class="nav-btn" data-file="DATABASE.md">03. Database / SQL</button>
                    <button class="nav-btn" data-file="ARCADE.md">04. The Arcade</button>
                </nav>
            </aside>

            <section class="wiki-content">
                <div id="rendered-markdown">
                    > Accessing restricted mainframe...
                </div>
            </section>

        </main>
    </div>

    <script>
        const contentArea = document.getElementById('rendered-markdown');
        const navButtons = document.querySelectorAll('.nav-btn');

        async function loadDocument(filename) {
            try {
                contentArea.innerHTML = "<p style='color: var(--neon-gold);'>Decrypting records...</p>";
                
                const response = await fetch(filename);
                if (!response.ok) throw new Error(`Could not locate ${filename}`);
                
                const markdownText = await response.text();
                contentArea.innerHTML = marked.parse(markdownText);

                // Initialize the interactive features
                interceptInternalLinks();
                generateTableOfContents();

            } catch (error) {
                contentArea.innerHTML = `<h2 style="color: var(--alert-red);">FILE CORRUPTED</h2><p>${error.message}</p>`;
            }
        }

        // --- NEW: DYNAMIC TABLE OF CONTENTS GENERATOR ---
        function generateTableOfContents() {
            // 1. Remove any old TOCs from the sidebar
            document.querySelectorAll('.toc-container').forEach(el => el.remove());

            // 2. Find the currently active sidebar button
            const activeBtn = document.querySelector('.nav-btn.active');
            if (!activeBtn) return;

            // 3. Scan the newly loaded markdown HTML for sections (h2, h3)
            const headings = contentArea.querySelectorAll('h2, h3');
            if (headings.length === 0) return;

            // 4. Create the new nested tree container
            const tocContainer = document.createElement('div');
            tocContainer.className = 'toc-container';

            // 5. Turn each heading into a clickable sub-link
            headings.forEach(heading => {
                // Ensure the heading has an ID so we can scroll to it
                if (!heading.id) {
                    heading.id = heading.innerText.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                }

                const link = document.createElement('button');
                // Adds a specific class based on whether it's an H2 or H3 for indented styling
                link.className = `toc-link toc-${heading.tagName.toLowerCase()}`;
                link.innerText = heading.innerText;
                
                // Clicking the sub-link smoothly scrolls the main content window to that section
                link.addEventListener('click', () => {
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });

                tocContainer.appendChild(link);
            });

            // 6. Inject the tree into the sidebar right below the active button
            activeBtn.parentNode.insertBefore(tocContainer, activeBtn.nextSibling);
        }

        // Make internal markdown links work with our custom viewer
        function interceptInternalLinks() {
            const links = contentArea.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.endsWith('.md')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault(); 
                        updateSidebar(href);
                        loadDocument(href);
                        window.scrollTo(0, 0); 
                    });
                }
            });
        }

        function updateSidebar(filename) {
            navButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-file') === filename) {
                    btn.classList.add('active');
                }
            });
        }

        navButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const file = e.target.getAttribute('data-file');
                updateSidebar(file);
                loadDocument(file);
                window.scrollTo(0, 0); // Scroll to top when changing pages
            });
        });

        // Boot sequence
        loadDocument('README.md');
    </script>
</body>
</html>
